{% extends "layouts/base.html" %}

{% block title %} Simple Query Results {% endblock title %}

{% block content %}
    <div style="margin: 20px;">
        <h2>Simple Query Results:</h2>
        <hr>
        {% for obj in books %}
            ID: {{obj.id}}, Title: {{obj.title}}
            <hr>
        {% empty %}
            <p style="color: red;">No books found matching your query.</p>
        {% endfor %}
    </div>
{% endblock content %}
